<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foundation Numeracy Sample</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #eef4fb; color: #18212d; }
      main { max-width: 760px; margin: 0 auto; padding: 32px 20px 48px; }
      .sheet { background: white; border-radius: 24px; padding: 28px; box-shadow: 0 16px 36px rgba(24,33,45,.08); }
      .badge { display:inline-block; padding: 6px 12px; border-radius: 999px; background:#d9ede5; font-weight:700; }
      .row { display:flex; gap:14px; flex-wrap:wrap; margin-top:18px; }
      .chip { padding:12px 14px; border-radius: 16px; background:#f5f7fb; border:1px solid #d9e1ea; }
    </style>
  </head>
  <body>
    <main>
      <div class="sheet">
        <span class="badge">UKG Numeracy Preview</span>
        <h1>Number Bond Builder</h1>
        <p>This sample introduces quantity pairing, number bonds to ten, and quick mental-recall prompts.</p>
        <div class="row">
          <div class="chip">4 + 3 = ?</div>
          <div class="chip">6 + 2 = ?</div>
          <div class="chip">7 is made of 5 and ?</div>
          <div class="chip">Count and color 9 stars.</div>
        </div>
      </div>
    </main>
  </body>
</html>
